    <title>Document</title>
    <link

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
      <!-- Navigation Bar -->
      <a class="navbar-brand" href="#page-top">WebConference</a>
      <button
        class="navbar-toggler navbar-toggler-right"
        type="button"
        data-toggle="collapse"
        data-target="#navbarResponsive"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarResponsive">
        <!-- Navigation Items -->
        <ul class="navbar-nav text-uppercase ml-auto">
          <li class="nav-item">
            <a class="nav-link" href="#about">about</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#speakers">speakers</a>
          </li>
          <li class="nav-item">

          </li>
          <li class="nav-item">
            <a class="nav-link" href="#contacts">contacts</a>
          </li>
        </ul>
      </div>

      <div class="container">
        <div class="intro-text">
          <!-- Title -->
          <div class="intro-lead-in">Let's celebrate the Web!</div>
          <div class="intro-heading text-uppercase">WebConference</div>
          <!-- Subscription button -->
          <a
            class="btn btn-primary btn-xl text-uppercase"
            href="#"
            id="btnRegister"
          >

        </div>
      </div>

    </section>
    <section id="speakers">
      <!-- Information about the conference speakers -->

    <section id="sponsors">
      <!-- Information about the conference sponsors -->
    </section>
    <section id="contacts">

    </section>
    <footer>
      <!-- Socials links and copyright -->
